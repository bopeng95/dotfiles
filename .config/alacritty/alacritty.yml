# Window Customizations
window:
  # dimensions:
  #   columns: 100
  #   lines: 40
  padding:
    x: 10
    y: 10
  # decorations: none
scrolling:
  history: 10000
  multiplier: 3
background_opacity: 0.95

# Font configuration
font:
  normal:
    family: monofur for Powerline
    style: Regular
  bold:
    family: monofur for Powerline
    style: Bold
  italic:
    family: monofur for Powerline
    style: Italic
  size: 18.0

  # Offset is the extra space around each character. `offset.y` can be thought of
  # as modifying the line spacing, and `offset.x` as modifying the letter spacing.
  offset:
    x: 0
    y: 1

  # Glyph offset determines the locations of the glyphs within their cells with
  # the default being at the bottom. Increasing `x` moves the glyph to the right,
  # increasing `y` moves the glyph upwards.
  glyph_offset:
    x: 0
    y: 0

# Colors (Gruvbox dark)
colors:
  primary:
    background: '#282828'
    foreground: '#ebdbb2'
  normal:
    black:   '#282828'
    red:     '#cc241d'
    green:   '#98971a'
    yellow:  '#d79921'
    blue:    '#458588'
    magenta: '#b16286'
    cyan:    '#689d6a'
    white:   '#a89984'
  bright:
    black:   '#928374'
    red:     '#fb4934'
    green:   '#b8bb26'
    yellow:  '#fabd2f'
    blue:    '#83a598'
    magenta: '#d3869b'
    cyan:    '#8ec07c'
    white:   '#ebdbb2'

  selection:
    text: '0xffffff'
    background: '0x505050'
    white: '0xffffff'
    save_to_clipboard: true

cursor:
  style: Block
  unfocused_hollow: true

# Keybindings
  key_bindings:
    - { key: N, mods: Control, action: SpawnNewInstance }
